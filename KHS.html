<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>KHS Sports | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header class="triple-header">
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>KHS Portfolio</h1>
            <p class="about-me">The Ultimate Production Crossover | Digital Creator & Producer</p>
        </header>

        <nav class="category-nav">
            <div class="bubble" onclick="loadSport('basketball', 'Basketball')">Basketball</div>
            <div class="bubble" onclick="loadSport('football', 'Football')">Football</div>
            <div class="bubble" onclick="loadSport('soccer', 'Soccer')">Soccer</div>
            <div class="bubble" onclick="loadSport('track', 'Track')">Track</div>
            <div class="bubble" onclick="loadSport('cross-country', 'XC')">XC</div>
            <div class="bubble" onclick="loadSport('bowling', 'Bowling')">Bowling</div>
            <div class="bubble" onclick="loadSport('volleyball', 'Volleyball')">Volleyball</div>
            <div class="bubble" onclick="loadSport('events', 'Events')">Events</div>
        </nav>
        <h3 id="sport-title" style="text-transform: uppercase; opacity: 0.5; font-size: 0.7rem;">Select Category</h3>
        
        <div class="photo-grid" id="gallery"></div>
        <a href="index.html" class="bubble" style="margin-top:30px; display:inline-block; background:white; color:black;">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="document.getElementById('lightbox').style.display='none'">&times;</span>
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" href="" download class="bubble">Download Image</a>
    </div>

    <script>
        function loadSport(folder, label) {
            const gallery = document.getElementById('gallery');
            document.getElementById('sport-title').innerText = label;
            gallery.innerHTML = "";
            for (let i = 1; i <= 100; i++) {
                const item = document.createElement('div');
                item.className = 'photo-item';
                const img = document.createElement('img');
                const formats = [".JPG", ".PNG", ".jpg", ".png"];
                let fIdx = 0;
                img.onerror = function() {
                    fIdx++;
                    if (fIdx < formats.length) { this.src = `images/khs/${folder}/${i}${formats[fIdx]}`; }
                    else { this.parentElement.style.display = 'none'; }
                };
                img.src = `images/khs/${folder}/${i}${formats[0]}`;
                img.onclick = function() { openLB(this.src); };
                item.appendChild(img);
                gallery.appendChild(item);
            }
        }
        function openLB(s) {
            document.getElementById('lb-img').src = s;
            const dl = document.getElementById('dl-btn');
            dl.href = s; dl.setAttribute('download', s.split('/').pop());
            document.getElementById('lightbox').style.display = 'flex';
        }
        window.onload = () => loadSport('football', 'Football');
    </script>
</body>
</html>
