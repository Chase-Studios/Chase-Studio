<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHS Album | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@lyket/widget@latest/dist/lyket.js?apiKey=pt_4bc8fc024f1b7ec5d14b961433be41"></script>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header class="triple-header">
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>KHS Album</h1>
        </header>

        <nav class="social-bubbles" style="overflow-x: auto; flex-wrap: nowrap; padding-bottom: 10px;">
            <div class="bubble" onclick="load('basketball', 50, 'Basketball')">Basketball</div>
            <div class="bubble" onclick="load('football', 50, 'Football')">Football</div>
            <div class="bubble" onclick="load('soccer', 50, 'Soccer')">Soccer</div>
            <div class="bubble" onclick="load('track', 50, 'Track')">Track</div>
            <div class="bubble" onclick="load('cross-country', 50, 'Cross Country')">XC</div>
            <div class="bubble" onclick="load('bowling', 50, 'Bowling')">Bowling</div>
            <div class="bubble" onclick="load('volleyball', 50, 'Volleyball')">Volleyball</div>
            <div class="bubble" onclick="load('events', 50, 'Events')">Events</div>
        </nav>

        <h3 id="sport-title" style="opacity:0.5; letter-spacing:2px; margin-top:20px; text-transform: uppercase;">Select a Sport</h3>
        <div class="photo-grid" id="gallery"></div>

        <a href="index.html" class="bubble back-btn">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img class="lightbox-content" id="lb-img"></div>

    <script>
        function load(folder, count, name) {
            document.getElementById('sport-title').innerText = name;
            const g = document.getElementById('gallery'); 
            g.innerHTML = "";
            
            for (let i = 1; i <= count; i++) {
                const item = document.createElement('div');
                item.className = 'photo-item';
                
                // We create the image and try .JPG first. 
                // If it fails, the "onerror" tries .jpg, then hides if both fail.
                const img = document.createElement('img');
                const primaryPath = `images/khs/${folder}/${i}.JPG`;
                const secondaryPath = `images/khs/${folder}/${i}.jpg`;
                
                img.src = primaryPath;
                img.onclick = () => openLB(img.src);
                img.onerror = function() {
                    if (this.src.includes('.JPG')) {
                        this.src = secondaryPath;
                    } else {
                        this.parentElement.style.display = 'none';
                    }
                };
                
                item.appendChild(img);
                g.appendChild(item);
            }
        }
        function openLB(s) { 
            document.getElementById('lightbox').style.display='flex'; 
            document.getElementById('lb-img').src=s; 
        }
        // Default sport to show on load
        window.onload = () => load('football', 50, 'Football');
    </script>
</body>
</html>
