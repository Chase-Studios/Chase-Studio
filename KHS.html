<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHS Sports | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Kauai High School</h1>
        </header>

        <nav class="category-nav">
            <div class="bubble" onclick="loadSport('football')">Football</div>
            <div class="bubble" onclick="loadSport('basketball')">Basketball</div>
            <div class="bubble" onclick="loadSport('volleyball')">Volleyball</div>
            <div class="bubble" onclick="loadSport('soccer')">Soccer</div>
            <div class="bubble" onclick="loadSport('cross-country')">XC</div>
            <div class="bubble" onclick="loadSport('bowling')">Bowling</div>
            <div class="bubble" onclick="loadSport('track')">Track</div>
            <div class="bubble" onclick="loadSport('events')">Events</div>
        </nav>

        <div class="photo-grid" id="gallery"></div>
        
        <div style="margin-top: 30px;">
            <a href="index.html" class="bubble">Return Home</a>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="if(event.target == this) this.style.display='none'">
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" class="action-btn" href="#" download>Download Image</a>
    </div>

    <script>
        function loadSport(sport) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ""; // Clear current images
            
            for (let i = 1; i <= 100; i++) {
                const path = `images/khs/${sport}/${i}.jpg`;
                const item = document.createElement('div');
                item.className = 'photo-item';
                
                const img = document.createElement('img');
                img.src = path;
                img.onclick = () => {
                    document.getElementById('lb-img').src = path;
                    document.getElementById('dl-btn').href = path; // Fixes the download link
                    document.getElementById('lightbox').style.display = 'flex';
                };
                
                // If image doesn't exist (e.g., only 5 photos in folder), hide the box
                img.onerror = function() { this.parentElement.remove(); };
                
                item.appendChild(img);
                gallery.appendChild(item);
            }
        }
        // Load football by default when page opens
        window.onload = () => loadSport('football');
    </script>
</body>
</html>
