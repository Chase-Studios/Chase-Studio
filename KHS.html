<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>KHS Sports</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Chase Studios</h1>
            <p class="about-me">The Ultimate Production Crossover | Digital Creator</p>
        </header>

        <nav class="category-nav">
            <div class="bubble" onclick="loadSport('basketball', 'Basketball')">Basketball</div>
            <div class="bubble" onclick="loadSport('football', 'Football')">Football</div>
            <div class="bubble" onclick="loadSport('soccer', 'Soccer')">Soccer</div>
            <div class="bubble" onclick="loadSport('track', 'Track')">Track</div>
            <div class="bubble" onclick="loadSport('cross-country', 'XC')">XC</div>
            <div class="bubble" onclick="loadSport('bowling', 'Bowling')">Bowling</div>
            <div class="bubble" onclick="loadSport('volleyball', 'Volleyball')">Volleyball</div>
            <div class="bubble" onclick="loadSport('events', 'Events')">Events</div>
        </nav>

        <div class="photo-grid" id="gallery"></div>
        <a href="index.html" class="bubble" style="margin-top:30px;">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="this.parentElement.style.display='none'">&times;</span>
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" href="" download>Download</a>
    </div>

    <script>
        const username = "Chase-Studios"; 
        const repo = "Chase-Studio";

        async function loadSport(sport) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "Loading...";
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images/khs/${sport}`);
                const files = await response.json();
                gallery.innerHTML = "";
                files.forEach(file => {
                    if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                        const item = document.createElement('div');
                        item.className = 'photo-item';
                        const img = document.createElement('img');
                        img.src = file.download_url;
                        img.onclick = () => {
                            document.getElementById('lb-img').src = img.src;
                            document.getElementById('dl-btn').href = img.src;
                            document.getElementById('dl-btn').setAttribute('download', file.name);
                            document.getElementById('lightbox').style.display = 'flex';
                        };
                        item.appendChild(img);
                        gallery.appendChild(item);
                    }
                });
            } catch (e) { gallery.innerHTML = "Error loading category."; }
        }
        window.onload = () => loadSport('football');
    </script>
</body>
</html>
