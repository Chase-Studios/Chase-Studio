<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>KHS Sports</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>KHS Portfolio</h1>
            <p class="about-me">The Ultimate Production Crossover</p>
        </header>

        <nav class="category-nav">
            <div class="bubble" onclick="loadSport('football')">Football</div>
            <div class="bubble" onclick="loadSport('basketball')">Basketball</div>
            <div class="bubble" onclick="loadSport('soccer')">Soccer</div>
            <div class="bubble" onclick="loadSport('track')">Track</div>
            <div class="bubble" onclick="loadSport('events')">Events</div>
        </nav>

        <div class="photo-grid" id="gallery"></div>
        <a href="index.html" class="bubble" style="margin-top:30px;">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="this.parentElement.style.display='none'">&times;</span>
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" href="" download>Download</a>
    </div>

    <script>
        const sportsData = {
            football: ["IMG_1234.PNG", "action1.jpg"],
            basketball: ["hoops.png"],
            soccer: [], track: [], events: []
        };

        function loadSport(cat) {
            const g = document.getElementById('gallery');
            g.innerHTML = "";
            (sportsData[cat] || []).forEach(name => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                const img = document.createElement('img');
                img.src = `images/khs/${cat}/${name}`;
                img.onclick = () => {
                    document.getElementById('lb-img').src = img.src;
                    document.getElementById('dl-btn').href = img.src;
                    document.getElementById('dl-btn').setAttribute('download', name);
                    document.getElementById('lightbox').style.display = 'flex';
                };
                item.appendChild(img);
                g.appendChild(item);
            });
        }
        window.onload = () => loadSport('football');
    </script>
</body>
</html>
