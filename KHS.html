<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHS Sports | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Special styles for the sports scroller */
        .category-nav {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 25px;
            scrollbar-width: none; /* Hide scrollbar for Chrome/Safari */
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .category-nav .bubble {
            white-space: nowrap;
            flex: 0 0 auto;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container glass-card">
        <header class="triple-header">
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>KHS Portfolio</h1>
        </header>

        <nav class="category-nav">
            <div class="bubble" onclick="loadSport('basketball', 20, 'Basketball')">Basketball</div>
            <div class="bubble" onclick="loadSport('football', 20, 'Football')">Football</div>
            <div class="bubble" onclick="loadSport('soccer', 20, 'Soccer')">Soccer</div>
            <div class="bubble" onclick="loadSport('track', 20, 'Track')">Track</div>
            <div class="bubble" onclick="loadSport('cross-country', 20, 'Cross Country')">Cross Country</div>
            <div class="bubble" onclick="loadSport('bowling', 20, 'Bowling')">Bowling</div>
            <div class="bubble" onclick="loadSport('volleyball', 20, 'Volleyball')">Volleyball</div>
            <div class="bubble" onclick="loadSport('events', 20, 'Inschool Events')">Events</div>
        </nav>

        <h3 id="current-sport-title" style="opacity: 0.5; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;">Select a Category</h3>

        <div class="photo-grid" id="khs-gallery"></div>

        <footer class="album-footer">
            <a href="index.html" class="bubble back-btn">Return Home</a>
        </footer>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
        const gallery = document.getElementById('khs-gallery');
        const title = document.getElementById('current-sport-title');

        function loadSport(folder, count, label) {
            gallery.innerHTML = ""; // Clear current photos
            title.innerText = label;

            for (let i = 1; i <= count; i++) {
                const item = document.createElement('div');
                item.className = 'photo-item';
                const path = `images/khs/${folder}/${i}.jpg`;
                
                // The onerror attribute ensures that if you set '20' images but only have '10', it won't show broken icons
                item.innerHTML = `<img src="${path}" onclick="openLightbox('${path}')" onerror="this.parentElement.style.display='none'">`;
                gallery.appendChild(item);
            }
        }

        function openLightbox(src) {
            document.getElementById("lightbox").style.display = "flex";
            document.getElementById("lightbox-img").src = src;
        }

        // Default to Football on load
        window.onload = () => loadSport('football', 20, 'Football');
    </script>
</body>
</html>
