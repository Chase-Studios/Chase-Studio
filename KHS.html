<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>KHS Sports | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Kauai High School</h1>
            <p style="opacity:0.6; font-size:0.8rem;">Select a Category</p>
        </header>

        <nav class="category-nav">
            <div class="bubble" onclick="loadSport('football')">Football</div>
            <div class="bubble" onclick="loadSport('basketball')">Basketball</div>
            <div class="bubble" onclick="loadSport('soccer')">Soccer</div>
            <div class="bubble" onclick="loadSport('volleyball')">Volleyball</div>
            <div class="bubble" onclick="loadSport('xc')">Cross Country</div>
            <div class="bubble" onclick="loadSport('bowling')">Bowling</div>
            <div class="bubble" onclick="loadSport('track')">Track</div>
            <div class="bubble" onclick="loadSport('events')">Events</div>
        </nav>

        <div class="photo-grid" id="gallery"></div>
        
        <div style="margin-top: 40px;">
            <a href="index.html" class="bubble">Return Home</a>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span style="position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer;" onclick="this.parentElement.style.display='none'">&times;</span>
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" href="" download>Download</a>
    </div>

    <script>
        // CHANGE THESE TO YOUR GITHUB DETAILS
        const username = "chase-studios"; 
        const repo = "Chase-Studio";

        async function loadSport(sport) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "<p>Loading " + sport + "...</p>";
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images/khs/${sport}`);
                const files = await response.json();
                
                if(!Array.isArray(files)) throw new Error();

                gallery.innerHTML = "";
                files.forEach(file => {
                    if (file.name.match(/\.(jpg|jpeg|png|webp)$/i)) {
                        const item = document.createElement('div');
                        item.className = 'photo-item';
                        const img = document.createElement('img');
                        img.src = file.download_url;
                        img.onclick = () => {
                            document.getElementById('lb-img').src = img.src;
                            document.getElementById('dl-btn').href = img.src;
                            document.getElementById('dl-btn').setAttribute('download', file.name);
                            document.getElementById('lightbox').style.display = 'flex';
                        };
                        item.appendChild(img);
                        gallery.appendChild(item);
                    }
                });
            } catch (e) { 
                gallery.innerHTML = "<p style='grid-column:1/-1; opacity:0.5;'>No photos found in the " + sport + " folder.</p>"; 
            }
        }
        window.onload = () => loadSport('football');
    </script>
</body>
</html>
