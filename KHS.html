<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHS Sports | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@lyket/widget@latest/dist/lyket.js?apiKey=pt_654321"></script>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <h1>KHS Sports</h1>
        <nav class="category-nav">
            <div class="bubble" onclick="loadSport('basketball', 'Basketball')">Basketball</div>
            <div class="bubble" onclick="loadSport('football', 'Football')">Football</div>
            <div class="bubble" onclick="loadSport('soccer', 'Soccer')">Soccer</div>
            <div class="bubble" onclick="loadSport('track', 'Track')">Track</div>
            <div class="bubble" onclick="loadSport('bowling', 'Bowling')">Bowling</div>
        </nav>
        <h3 id="sport-title">Select Sport</h3>
        <div class="photo-grid" id="gallery"></div>
        <a href="index.html" class="bubble" style="margin-top:20px; display:inline-block;">Back Home</a>
    </div>
    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img class="lightbox-content" id="lb-img"></div>
    <script>
        function loadSport(folder, label) {
            const gallery = document.getElementById('gallery');
            document.getElementById('sport-title').innerText = label;
            gallery.innerHTML = "";
            for (let i = 1; i <= 20; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'photo-item-wrap';
                const path = `images/khs/${folder}/${i}.JPG`;
                wrap.innerHTML = `<div class="photo-item"><img src="${path}" onclick="openLB('${path}')" onerror="this.parentElement.parentElement.style.display='none'"></div>
                <div class="rating-area" data-lyket-type="like" data-lyket-id="khs-${folder}-${i}" data-lyket-template="twitter"></div>`;
                gallery.appendChild(wrap);
            }
        }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display='flex'; }
        window.onload = () => loadSport('football', 'Football');
    </script>
</body>
</html>
