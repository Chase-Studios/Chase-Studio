<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Shoots | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@lyket/widget@latest/dist/lyket.js?apiKey=pt_4bc8fc024f1b7ec5d14b961433be41"></script>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header class="triple-header">
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Personal Shoots</h1>
        </header>

        <div class="photo-grid" id="shoots-gallery"></div>

        <a href="index.html" class="bubble back-btn">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img class="lightbox-content" id="lb-img"></div>

    <script>
        const folder = "images/shoots/";
        const count = 50; // Set to the max photos you might have
        const g = document.getElementById('shoots-gallery');

        for (let i = 1; i <= count; i++) {
            const item = document.createElement('div');
            item.className = 'photo-item';
            const img = document.createElement('img');
            
            // Auto-check for .JPG vs .jpg
            img.src = `${folder}${i}.JPG`;
            img.onclick = () => { document.getElementById('lightbox').style.display='flex'; document.getElementById('lb-img').src=img.src; };
            img.onerror = function() {
                if (this.src.includes('.JPG')) {
                    this.src = `${folder}${i}.jpg`;
                } else {
                    this.parentElement.style.display = 'none';
                }
            };
            item.appendChild(img);
            g.appendChild(item);
        }
    </script>
</body>
</html>
