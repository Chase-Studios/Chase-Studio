<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <h1>Gallery</h1>
        <div class="photo-grid" id="gallery"></div>
        <a href="index.html" class="bubble" style="margin-top:20px; display:inline-block;">Back Home</a>
    </div>
    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img class="lightbox-content" id="lb-img"></div>
    <script>
        const folderPath = "images/shoots/"; // Remember: Use "images/bts/" for the BTS page
        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 25; i++) {
            const item = document.createElement('div');
            item.className = 'photo-item';
            const path = `${folderPath}${i}.JPG`;
            item.innerHTML = `<img src="${path}" onclick="openLB('${path}')" onerror="this.parentElement.style.display='none'">`;
            gallery.appendChild(item);
        }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display='flex'; }
    </script>
</body>
</html>
