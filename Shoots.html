<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1 id="page-title">Gallery</h1>
            <p class="about-me">The Ultimate Production Crossover</p>
        </header>

        <div class="photo-grid" id="gallery"></div>

        <div style="margin-top: 50px;">
            <a href="index.html" class="bubble">Return Home</a>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span style="position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer;" onclick="this.parentElement.style.display='none'">&times;</span>
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" href="" download>Download Image</a>
    </div>

    <script>
        /* CHANGE THIS PATH FOR EACH PAGE */
        // For Shoots.html use: "images/shoots/"
        // For BTS.html use: "images/bts/"
        // For paid.html use: "images/paid/"
        const folderPath = "images/shoots/"; 

        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 40; i++) {
            const item = document.createElement('div');
            item.className = 'photo-item';
            
            const img = document.createElement('img');
            const fullPath = folderPath + i + ".jpg";
            img.src = fullPath;
            
            img.onclick = function() {
                document.getElementById('lb-img').src = this.src;
                document.getElementById('dl-btn').href = this.src;
                document.getElementById('lightbox').style.display = 'flex';
            };

            // Hide the box if the image doesn't exist
            img.onerror = function() { this.parentElement.style.display = 'none'; };
            
            item.appendChild(img);
            gallery.appendChild(item);
        }
    </script>
</body>
</html>
