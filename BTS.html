<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Gallery</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Gallery</h1>
        </header>
        <div class="photo-grid" id="gallery"></div>
        <a href="index.html" class="bubble" style="margin-top:30px;">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="this.parentElement.style.display='none'">&times;</span>
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" href="" download>Download</a>
    </div>

    <script>
        const folderPath = "images/bts/"; 
        const imageList = ["IMG_1234.PNG", "my_photo.jpg"]; // ADD NAMES HERE

        const g = document.getElementById('gallery');
        imageList.forEach(name => {
            const item = document.createElement('div');
            item.className = 'photo-item';
            const img = document.createElement('img');
            img.src = folderPath + name;
            img.onclick = () => {
                document.getElementById('lb-img').src = img.src;
                document.getElementById('dl-btn').href = img.src;
                document.getElementById('dl-btn').setAttribute('download', name);
                document.getElementById('lightbox').style.display = 'flex';
            };
            item.appendChild(img);
            g.appendChild(item);
        });
    </script>
</body>
</html>
