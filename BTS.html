<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>BTS | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Behind The Scenes</h1>
        </header>

        <div class="photo-grid" id="gallery"></div>
        <a href="index.html" class="bubble">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox" onclick="if(event.target == this) this.style.display='none'">
        <img class="lightbox-content" id="lb-img">
        <a id="dl-btn" class="action-btn" href="#" download>Download Image</a>
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 40; i++) {
            const path = `images/bts/${i}.jpg`;
            const item = document.createElement('div');
            item.className = 'photo-item';
            const img = document.createElement('img');
            img.src = path;
            img.onclick = () => {
                document.getElementById('lb-img').src = path;
                document.getElementById('dl-btn').href = path;
                document.getElementById('lightbox').style.display = 'flex';
            };
            img.onerror = function() { this.parentElement.remove(); };
            item.appendChild(img);
            gallery.appendChild(item);
        }
    </script>
</body>
</html>
