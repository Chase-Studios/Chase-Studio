<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Studios | Home</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader-overlay">
        <div class="loader-wrapper">
            <img src="images/logo1.png" id="side-left" class="loader-img">
            <img src="images/logo2.png" id="side-right" class="loader-img">
            <img src="images/logo-main.png" id="main-pop" class="loader-img">
        </div>
    </div>

    <div class="background-overlay"></div>

    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Chase Studios</h1>
            <p style="opacity:0.7; font-size:0.85rem;">The Ultimate Production Crossover | Digital Creator</p>
        </header>

        <nav class="photo-grid" style="margin-top: 20px;">
            <a href="Shoots.html" class="photo-item"><img src="images/covers/shootscover.png"></a>
            <a href="KHS.html" class="photo-item"><img src="images/covers/khscover.png"></a>
            <a href="BTS.html" class="photo-item"><img src="images/covers/btscover.png"></a>
            <a href="paid.html" class="photo-item"><img src="images/covers/paidcover.png"></a>
        </nav>
    </div>

    <script>
        function reveal() { setTimeout(() => { document.body.classList.add('loaded'); }, 2200); }
        window.addEventListener('load', reveal);
        setTimeout(() => { if(!document.body.classList.contains('loaded')) reveal(); }, 4000);
    </script>
</body>
</html>
