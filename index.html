<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Studios</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container glass-card">
        <header>
            <img src="images/logo.png" alt="Chase Studios" class="logo">
            <h1>Chase Studios</h1>
            <p class="about-me">Digital Creator & Producer. Capturing the world through a lens of modern aesthetics.</p>
        </header>

        <section class="social-bubbles">
            <a href="https://tiktok.com/@notchas3.lol" class="bubble">Not Chase TikTok</a>
            <a href="https://tiktok.com/@chasestudiotv" class="bubble">Chase Studio TikTok</a>
            <a href="https://instagram.com/chas3.lol" class="bubble">Chase Instagram</a>
            <a href="https://instagram.com/chyston.studio.pics" class="bubble">Chyston Instagram</a>
            <a href="https://youtube.com/@NOTCHAS3" class="bubble">YouTube</a>
        </section>

        <section class="album-section">
            <h3>Portfolios</h3>
            <div class="photo-grid">
                <div class="photo-item"><img src="images/shoot1.jpg" onclick="openLightbox(this.src)"></div>
                <div class="photo-item"><img src="images/life1.jpg" onclick="openLightbox(this.src)"></div>
                <div class="photo-item"><img src="images/bts1.jpg" onclick="openLightbox(this.src)"></div>
                <div class="photo-item"><img src="images/shoot2.jpg" onclick="openLightbox(this.src)"></div>
            </div>
        </section>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById("lightbox").style.display = "flex";
            document.getElementById("lightbox-img").src = src;
        }
        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
        }
    </script>
</body>
</html>
