<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Studios | Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header class="triple-header">
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Chase Studios</h1>
        </header>

        <nav class="social-bubbles">
            <a href="https://tiktok.com/@notchas3.lol" class="bubble">TikTok 1</a>
            <a href="https://tiktok.com/@chasestudiotv" class="bubble">TikTok 2</a>
            <a href="https://instagram.com/chas3.lol" class="bubble">IG 1</a>
            <a href="https://instagram.com/chyston.studio.pics" class="bubble">IG 2</a>
        </nav>

        <div class="video-wrapper">
            <iframe id="yt-latest" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="photo-grid">
            <a href="Shoots.html" class="photo-item"><img src="images/covers/shootscover.png"></a>
            <a href="KHS.html" class="photo-item"><img src="images/covers/khscover.png"></a>
            <a href="BTS.html" class="photo-item"><img src="images/covers/btscover.png"></a>
            <a href="paid.html" class="photo-item"><img src="images/covers/paidcover.png"></a>
        </div>
    </div>
    <script>
        const channelID = "UCp0D20R9I3N_p69v5Yn-v7w"; 
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`)
        .then(res => res.json()).then(data => {
            const videoId = data.items[0].link.split('v=')[1];
            document.getElementById('yt-latest').src = `https://www.youtube.com/embed/${videoId}`;
        });
    </script>
</body>
</html>
