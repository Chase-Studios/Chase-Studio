<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="images/favicon.png">

<body>
    <div id="loader-overlay">
        <div class="loader-wrapper">

    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1>Chyston Studios</h1>
            <p style="opacity:0.7; font-size:0.85rem;">Chyston Studio's | Digital Creator</p>

        <div class="quote-container">
            <span class="quote-text" id="daily-quote">"Loading inspiration..."</span>

        </nav>

<div class="photo-grid">
            <a href="Shoots.html" class="photo-item"><img src="images/covers/shootscover.png"></a>

        <footer>
            <p class="copyright-text">
                © 2026 CHYSTON STUDIOS | ALL RIGHTS RESERVED <br>
                <a href="terms.html" style="color: rgba(255,255,255,0.4); text-decoration: underline; font-size: 0.6rem; margin-top: 10px; display: inline-block;">Terms of Service</a>
            </p>
        </footer>

    </div> <script>
        function reveal() { setTimeout(() => { document.body.classList.add('loaded'); }, 2200); }
        window.addEventListener('load', reveal);
        setTimeout(() => { if(!document.body.classList.contains('loaded')) reveal(); }, 4000);
    </script>
    <script>
    const quotes = [
        { text: "Photography is the story I fail to put into words.", author: "Destin Sparks" },
        { text: "Your first 10,000 photographs are your worst.", author: "Henri Cartier-Bresson" },
        { text: "Skill in photography is acquired by practice and not by purchase.", author: "Percy W. Harris" },
        { text: "Content is anything that adds value to the reader's life.", author: "Avinash Kaushik" },
        { text: "Great photography is about depth of feeling, not depth of field.", author: "Peter Adam" },
        { text: "I don’t trust words. I trust pictures.", author: "Gilles Peress" },
        { text: "The best thing about a picture is that it never changes, even when the people in it do.", author: "Andy Warhol" },
        { text: "Don't shoot what it looks like. Shoot what it feels like.", author: "David Alan Harvey" }
    ];

    function setRandomQuote() {
        const randomIndex = Math.floor(Math.random() * quotes.length);
        const quote = quotes[randomIndex];
        document.getElementById('daily-quote').innerText = `"${quote.text}"`;
        document.getElementById('quote-author').innerText = `- ${quote.author}`;
    }

    // Run when the page loads
    window.addEventListener('DOMContentLoaded', setRandomQuote);
</script>
</body>
</html>
