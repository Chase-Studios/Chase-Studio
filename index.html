<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Studios | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-image"></div>

    <div class="container">
        <header>
            <img src="images/logo.png" alt="Chase Studios Logo" class="logo">
            <h1>Chase Studios</h1>
            <p class="tagline">Creator & Producer</p>
        </header>

        <section class="about-section">
            <h3>About Me</h3>
            <p>Welcome to Chase Studios. I specialize in high-quality visual storytelling, capturing moments through both the lens and the edit. Explore my latest work and socials below.</p>
        </section>

        <section class="socials-grid">
            <a href="https://tiktok.com/@yourlink" class="bubble-btn tiktok">TikTok 1</a>
            <a href="https://tiktok.com/@yourlink2" class="bubble-btn tiktok">TikTok 2</a>
            <a href="https://instagram.com/yourlink" class="bubble-btn insta">Instagram 1</a>
            <a href="https://instagram.com/yourlink2" class="bubble-btn insta">Instagram 2</a>
            <a href="https://youtube.com/yourlink" class="bubble-btn youtube">YouTube</a>
        </section>

        <section class="video-gallery">
            <h3>Featured Videos</h3>
            <div class="video-container">
                <video controls poster="images/video-thumbnail.jpg">
                    <source src="videos/video1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </section>

        <section class="photo-gallery">
            <h3>Photography</h3>
            <div class="image-grid">
                <img src="images/photo1.jpg" alt="Work 1">
                <img src="images/photo2.jpg" alt="Work 2">
