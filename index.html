<body>

            <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
            <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
        </div>

        <nav class="social-bubbles">

    <script>
        function finishLoading() {
            setTimeout(() => { document.body.classList.add('loaded'); }, 2200);
        }
        window.addEventListener('load', finishLoading);
        // Fail-safe for mobile
        setTimeout(() => { if(!document.body.classList.contains('loaded')) finishLoading(); }, 4000);
    </script>
