<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Studios</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <header>
            <img src="images/logo.png" alt="Chase Studios" class="logo">
            <h1>Chase Studios</h1>
            <p class="about-me">Digital Creator & Producer. Capturing the world through a lens of modern aesthetics. Follow my journey across all platforms below.</p>
        </header>

        <section class="social-bubbles">
            <a href="https://tiktok.com/@notchas3.lol" class="bubble tiktok">Not Chase TikTok</a>
            <a href="https://tiktok.com/@chasestudiotv" class="bubble tiktok">Chase Studio TikTok</a>
            <a href="https://instagram.com/chas3.lol" class="bubble insta">Chase Instagram</a>
            <a href="https://instagram.com/chyston.studio.pics" class="bubble insta">Chyston Instagram</a>
            <a href="https://youtube.com/@NOTCHAS3" class="bubble yt">YouTube</a>
        </section>

        <section class="feed-section">
            <h3>Latest YouTube</h3>
            <div class="video-wrapper">
                <iframe id="yt-latest" width="100%" height="315" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="album-section">
            <h3>Portfolios</h3>
            <div class="album-controls">
                <button class="filter-btn active" onclick="filterAlbum('all')">All</button>
                <button class="filter-btn" onclick="filterAlbum('shoots')">Shoots</button>
                <button class="filter-btn" onclick="filterAlbum('lifestyle')">Lifestyle</button>
                <button class="filter-btn" onclick="filterAlbum('bts')">BTS</button>
            </div>

            <div class="photo-grid">
                <div class="photo-item shoots"><img src="images/shoot1.jpg" alt="Shoot"></div>
                <div class="photo-item lifestyle"><img src="images/life1.jpg" alt="Lifestyle"></div>
                <div class="photo-item bts"><img src="images/bts1.jpg" alt="BTS"></div>
                <div class="photo-item shoots"><img src="images/shoot2.jpg" alt="Shoot"></div>
            </div>
        </section>
    </div>

    <script>
        // Replace this with your actual YouTube Channel ID (Found in YT Advanced Settings)
        const channelID = "UCp0D20R9I3N_p69v5Yn-v7w"; 
        const ytIframe = document.getElementById('yt-latest');
        
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`)
        .then(response => response.json())
        .then(data => {
            if(data.items && data.items.length > 0) {
                const videoId = data.items[0].link.split('v=')[1];
                ytIframe.src = `https://www.youtube.com/embed/${videoId}`;
            }
        });

        // Photo Filter Logic
        function filterAlbum(category) {
            const items = document.querySelectorAll('.photo-item');
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
