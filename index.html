<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Studios | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>

    <div class="container glass-card">
        <header class="triple-header">
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png" alt="Logo Left"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png" alt="Main Logo"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png" alt="Logo Right"></div>
            </div>
            <h1>Chase Studios</h1>
            <p class="about-me">The Ultimate Production Crossover</p>
        </header>

        <nav class="social-bubbles">
            <a href="https://tiktok.com/@notchas3.lol" class="bubble">Not Chase TikTok</a>
            <a href="https://tiktok.com/@chasestudiotv" class="bubble">Chase Studio TikTok</a>
            <a href="https://instagram.com/chas3.lol" class="bubble">Chase Instagram</a>
            <a href="https://instagram.com/chyston.studio" class="bubble">Chyston Instagram</a>
            <a href="https://youtube.com/@NOTCHAS3" class="bubble">YouTube</a>
        </nav>

        <section class="section">
            <h3 class="section-title">Portfolios</h3>
            <div class="photo-grid">
                
                <a href="Shoots.html" class="photo-item">
                    <img src="images/covers/shootscover.png" alt="Personal Shoots">
                    <div class="album-overlay"><span>Personal</span></div>
                </a>

                <a href="KHS.html" class="photo-item">
                    <img src="images/covers/khscover.png" alt="KHS Sports">
                    <div class="album-overlay"><span>KHS Album</span></div>
                </a>

                <a href="BTS.html" class="photo-item">
                    <img src="images/covers/btscover.png" alt="Behind the Scenes">
                    <div class="album-overlay"><span>BTS</span></div>
                </a>

                <a href="Paid.html" class="photo-item">
                    <img src="images/covers/paidcover.png" alt="Paid Work">
                    <div class="album-overlay" style="background: rgba(255, 215, 0, 0.2);">
                        <span style="border-color: #ffd700; color: #ffd700;">PREMIUM / PAID</span>
                    </div>
                </a>

            </div>
        </section>

        <footer style="margin-top: 40px; opacity: 0.4; font-size: 0.7rem;">
            <p>&copy; 2026 Chase Studios. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
