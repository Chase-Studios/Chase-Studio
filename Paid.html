<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Chase Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header class="triple-header">
            <div class="triple-logo-wrap">
                <div class="circle-frame frame-side"><img src="images/logo1.png"></div>
                <div class="circle-frame frame-center"><img src="images/logo-main.png"></div>
                <div class="circle-frame frame-side"><img src="images/logo2.png"></div>
            </div>
            <h1 id="gallery-title">Gallery</h1>
            <p class="about-me">The Ultimate Production Crossover | Digital Creator & Producer</p>
        </header>

        <div class="photo-grid" id="gallery"></div>

        <a href="index.html" class="bubble" style="margin-top:30px; display:inline-block; background:white; color:black;">Return Home</a>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img class="lightbox-content" id="lb-img"></div>

    <script>
        /* CONFIG: Change folderPath as needed */
        const folderPath = "images/paid/"; // OR images/bts/ OR images/paid/
        const galleryTitle = "Paid Stuff"; // Title for the top
        
        document.getElementById('gallery-title').innerText = galleryTitle;
        const gallery = document.getElementById('gallery');

        for (let i = 1; i <= 50; i++) {
            const item = document.createElement('div');
            item.className = 'photo-item';
            const path = `${folderPath}${i}.JPG`;
            item.innerHTML = `<img src="${path}" onclick="openLB('${path}')" onerror="this.parentElement.style.display='none'">`;
            gallery.appendChild(item);
        }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display='flex'; }
    </script>
</body>
</html>
